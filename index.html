<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CRUD Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-64 bg-indigo-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-8">Inventory App</h1>
            <nav class="space-y-4">
                <a href="index.html" class="block py-2 px-4 bg-indigo-700 rounded">Dashboard</a>
                <a href="data-barang.html" class="block py-2 px-4 hover:bg-indigo-700 rounded">Data Barang</a>
                <a href="tambah-barang.html" class="block py-2 px-4 hover:bg-indigo-700 rounded">Tambah Barang</a>
                <a href="profil.html" class="block py-2 px-4 hover:bg-indigo-700 rounded">Profil Developer</a>
                <a href="kontak.html" class="block py-2 px-4 hover:bg-indigo-700 rounded">Kontak</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8 bg-white p-4 rounded shadow">
                <h2 class="text-xl font-semibold">Selamat Datang, Admin</h2>
                <span class="text-gray-500">Senin, 06 April 2026</span>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-blue-500 text-white p-6 rounded-lg shadow">
                    <p class="text-sm">Total Barang</p>
                    <h3 class="text-3xl font-bold">120</h3>
                </div>
                <div class="bg-green-500 text-white p-6 rounded-lg shadow">
                    <p class="text-sm">Barang Masuk</p>
                    <h3 class="text-3xl font-bold">12</h3>
                </div>
                <div class="bg-red-500 text-white p-6 rounded-lg shadow">
                    <p class="text-sm">Stok Rendah</p>
                    <h3 class="text-3xl font-bold">5</h3>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
