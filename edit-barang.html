<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Barang - Inventory App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-56 shrink-0 bg-indigo-900 text-white flex flex-col p-6">
        <h1 class="text-lg font-bold mb-8">Inventory App</h1>
        <nav class="flex flex-col gap-1 flex-1 text-sm">
            <a href="index.html"         class="px-4 py-2 rounded hover:bg-indigo-700">Dashboard</a>
            <a href="data-barang.html"   class="px-4 py-2 rounded bg-indigo-700">Data Barang</a>
            <a href="tambah-barang.html" class="px-4 py-2 rounded hover:bg-indigo-700">Tambah Barang</a>
            <a href="profil.html"        class="px-4 py-2 rounded hover:bg-indigo-700">Profil Developer</a>
            <a href="kontak.html"        class="px-4 py-2 rounded hover:bg-indigo-700">Kontak</a>
        </nav>
        <p class="text-indigo-400 text-xs">UKK RPL 2026 &copy; Bepann</p>
    </aside>

    <!-- AREA KANAN -->
    <div class="flex-1 flex flex-col">

        <!-- HEADER -->
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center sticky top-0 z-20">
            <div class="flex items-center gap-4">
                <!-- Tombol burger, hanya tampil di mobile -->
                <button onclick="toggleSidebar()" class="md:hidden text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <h2 class="font-semibold text-lg">Edit Barang</h2>
            </div>
        </header>

        <!-- KONTEN -->
        <main class="flex-1 p-8">
            <div class="bg-white rounded-lg shadow p-6 max-w-lg">
                <h3 class="font-semibold mb-6">Form Edit Barang</h3>

                <!-- Form dengan data contoh yang sudah terisi -->
                <form action="data-barang.html" method="GET" class="space-y-4">

                    <!-- Kode Barang (readonly) -->
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Kode Barang</label>
                        <input type="text" value="BRG-001" readonly
                            class="w-full border border-gray-200 bg-gray-50 rounded px-3 py-2 text-sm text-gray-500 cursor-not-allowed">
                    </div>

                    <!-- Nama Barang -->
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Nama Barang</label>
                        <input type="text" name="nama" value="Laptop Gaming" required
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>

                    <!-- Kategori -->
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Kategori</label>
                        <select name="kategori"
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
                            <option selected>Elektronik</option>
                            <option>Furniture</option>
                            <option>Alat Tulis</option>
                        </select>
                    </div>

                    <!-- Stok -->
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Jumlah Stok</label>
                        <input type="number" name="stok" value="10" min="0" required
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>

                    <!-- Tombol -->
                    <div class="flex gap-3 pt-2">
                        <button type="submit"
                            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded text-sm font-semibold">
                            Simpan Perubahan
                        </button>
                        <a href="data-barang.html"
                           class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 rounded text-sm font-semibold text-center">
                            Batal
                        </a>
                    </div>
                </form>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-white border-t text-center text-xs text-gray-400 py-4">
            &copy; 2026 Inventory App &mdash; Bepann
        </footer>
    </div>
</div>

<script>
    /* Toggle sidebar di mobile */
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }
</script>

</body>
</html>
